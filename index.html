<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="食材保鲜管家 Android 风格 demo：模拟冰箱拍照识别食材、新鲜度评分和过期提醒。"
  />
  <title>食材保鲜管家 Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-stage" aria-label="食材保鲜管家 Android App Demo">
    <section class="phone-shell" aria-label="手机界面预览">
      <div class="app-screen">
        <header class="app-header">
          <div>
            <p class="eyebrow">智能冰箱</p>
            <h1>食材保鲜管家</h1>
          </div>
          <button class="round-button" type="button" aria-label="设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.2" />
              <path d="M19.1 13.4c.05-.46.05-.94 0-1.4l1.72-1.35-1.74-3.02-2.04.82a7.35 7.35 0 0 0-1.68-.98L15.05 5.3h-6.1l-.31 2.17c-.6.25-1.16.58-1.68.98l-2.04-.82-1.74 3.02L4.9 12c-.05.46-.05.94 0 1.4l-1.72 1.35 1.74 3.02 2.04-.82c.52.4 1.08.73 1.68.98l.31 2.17h6.1l.31-2.17c.6-.25 1.16-.58 1.68-.98l2.04.82 1.74-3.02-1.72-1.35Z" />
            </svg>
          </button>
        </header>

        <div id="pageContent" class="page-content"></div>
      </div>

      <nav class="bottom-nav" id="bottomNav" aria-label="底部导航">
        <button class="nav-item is-active" type="button" data-nav="inventory" aria-label="库存">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 4h14v16H5V4Z" />
            <path d="M8 8h8M8 12h8M8 16h5" />
          </svg>
          <span>库存</span>
        </button>
        <button class="nav-item" type="button" data-nav="reminders" aria-label="提醒">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 10a6 6 0 1 1 12 0v4l2 3H4l2-3v-4Z" />
            <path d="M10 20h4" />
          </svg>
          <span>提醒</span>
        </button>
        <button class="camera-fab" id="bottomScanButton" type="button" data-nav="scan" aria-label="拍照">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h1.2l1.2-2h6.2l1.2 2h1.2A2.5 2.5 0 0 1 20 8.5v8A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-8Z" />
            <path d="M12 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
          </svg>
          <span>拍照</span>
        </button>
        <button class="nav-item" type="button" data-nav="recipes" aria-label="菜谱">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 4h12v16H6V4Z" />
            <path d="M9 8h6M9 12h6M9 16h3" />
          </svg>
          <span>菜谱</span>
        </button>
        <button class="nav-item" type="button" data-nav="profile" aria-label="我的">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
            <path d="M4 21a8 8 0 0 1 16 0" />
          </svg>
          <span>我的</span>
        </button>
      </nav>

      <section class="sheet" id="scanSheet" aria-hidden="true" aria-label="模拟拍照识别面板">
        <div class="sheet-panel">
          <div class="sheet-handle" aria-hidden="true"></div>
          <div class="sheet-header">
            <h2>冰箱拍照识别</h2>
            <button class="round-button" id="closeScan" type="button" aria-label="关闭拍照识别">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18" />
              </svg>
            </button>
          </div>
          <div class="scan-preview">
            <div class="fridge-stage-bg" aria-hidden="true">
              <span class="fridge-wall fridge-wall-left"></span>
              <span class="fridge-wall fridge-wall-right"></span>
              <span class="fridge-shelf fridge-shelf-one"></span>
              <span class="fridge-shelf fridge-shelf-two"></span>
            </div>
            <div class="sheet-detection-root" id="sheetDetectionLayer" aria-hidden="true"></div>
            <span class="scan-frame" aria-hidden="true"></span>
          </div>
          <p id="scanProgress" class="scan-progress">准备识别冰箱照片</p>
          <button class="wide-action" id="startScan" type="button">开始识别</button>
        </div>
      </section>

      <section class="sheet" id="detailSheet" aria-hidden="true" aria-label="食材详情面板">
        <div class="sheet-panel">
          <div class="sheet-handle" aria-hidden="true"></div>
          <div class="sheet-header">
            <h2>食材详情</h2>
            <button class="round-button" id="closeDetail" type="button" aria-label="关闭食材详情">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18" />
              </svg>
            </button>
          </div>
          <div id="detailContent"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
